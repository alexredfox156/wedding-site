
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wedding</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#faf9f7;
  font-family:Arial;
}

/* vinyl */
.vinyl-wrap{
  position:relative;
  width:140px;
  height:140px;
}

.vinyl{
  width:140px;
  height:140px;
  border-radius:50%;
  background: radial-gradient(circle at center, #111 0 20%, #222 21% 40%, #111 41% 60%, #000 61% 100%);
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  cursor:pointer;
  animation:none;
}

.vinyl.playing{
  animation:spin 3s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

.center{
  position:absolute;
  top:50%;
  left:50%;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#faf9f7;
  transform:translate(-50%,-50%);
}

/* stop button */
.stop{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 14px;
  border-radius:20px;
  border:1px solid #0003;
  background:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="vinyl-wrap">
  <div id="vinyl" class="vinyl">
    <div class="center"></div>
  </div>
</div>

<button class="stop" id="stopBtn">Stop</button>

<script>
const audio=document.getElementById('music');
const vinyl=document.getElementById('vinyl');
const stop=document.getElementById('stopBtn');

let playing=false;

// one button start only
vinyl.addEventListener('click',()=>{
  if(!playing){
    audio.play();
    vinyl.classList.add('playing');
    playing=true;
  }
});

// stop only button
stop.addEventListener('click',()=>{
  audio.pause();
  audio.currentTime=0;
  vinyl.classList.remove('playing');
  playing=false;
});
</script>

</body>
</html>
